<line x1="747.3" y1="688" x2="747.3" y2="940" stroke="#f2f2f2" stroke-width="1"/>
<text x="86.0" y="1016.0" class="small" text-anchor="start">Thread labels are CPU host-thread settings; RSS is measured from isolated/scoped benchmark processes.</text>
</svg>

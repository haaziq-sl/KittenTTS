    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download Android native wheel from PyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip download --dest android-wheel --only-binary=:all: --no-deps --implementation cp --python-version "3.13" --abi cp313 --platform android_24_arm64_v8a "kitten-inference==${KITTEN_INFERENCE_VERSION}"
          ls -lh android-wheel

      - uses: actions/upload-artifact@v6

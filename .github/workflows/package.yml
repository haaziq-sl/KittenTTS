          - platform: Linux ARM64
            os: ubuntu-24.04-arm
            python-version: "3.14"
            python-tag: cp314
            wheel-platform: manylinux_2_28_aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v7
        with:
          name: kittentts-dist
          path: dist

      - name: Install built KittenTTS wheel without native deps
        run: |
          python -m pip install --upgrade pip
          python -c "from pathlib import Path; import subprocess, sys; wheel = next(Path('dist').glob('kittentts-*-py3-none-any.whl')); subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--no-deps', str(wheel)])"
          python -m pip install numpy soundfile phonemizer espeakng_loader huggingface_hub

      - name: Install exact PyPI native wheel
        run: |
          python -m pip download --dest native-wheel --only-binary=:all: --no-deps --implementation cp --python-version "${{ matrix.python-version }}" --abi "${{ matrix.python-tag }}" --platform "${{ matrix.wheel-platform }}" "kitten-inference==${KITTEN_INFERENCE_VERSION}"
          ls -lh native-wheel
          python -m pip install native-wheel/*.whl

      - name: Smoke test installed wheel
        run: |
          python -c "import importlib.metadata as md, os; import kittentts; import model_inference as mi; print('kittentts', md.version('kittentts')); print('kitten-inference', md.version('kitten-inference')); print(mi.__file__); assert md.version('kitten-inference') == os.environ['KITTEN_INFERENCE_VERSION']; assert hasattr(mi.InferenceModel, 'set_speed'); assert mi.set_backend('cpu'); assert mi.active_backend() == 'cpu'; assert kittentts.normalize_text('Fig. 2') == 'Figure two'"

      - name: Run tests against installed wheel
        run: python -m unittest discover -s tests

      - uses: actions/cache@v5
        with:
          path: .hf-cache
          key: hf-${{ runner.os }}-${{ runner.arch }}-kitten-audio-v1

      - name: Generate audio sample
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python tests/audio_smoke.py --mode quick --out-dir audio-smoke --cache-dir .hf-cache

      - uses: actions/upload-artifact@v6
        with:
          name: kittentts-audio-linux-${{ matrix.wheel-platform }}-${{ matrix.python-tag }}
          path: audio-smoke/*


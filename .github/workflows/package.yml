name: Build and test KittenTTS wheel

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/package.yml"
      - "kittentts/**"
      - "tests/**"
      - "README.md"
      - "MANIFEST.in"
      - "pyproject.toml"
      - "setup.py"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  KITTEN_INFERENCE_VERSION: "0.1.1"
  HF_HUB_DISABLE_TELEMETRY: "1"

jobs:
  unit-tests:
    name: Unit tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package without native runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps

      - name: Run tests
        run: python -m unittest discover -s tests

  build:
    name: Build py3-none-any wheel and sdist
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Verify wheel tag
        run: |
          python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("kittentts-*.whl"))
          assert len(wheels) == 1, wheels
          wheel = wheels[0]
          print(wheel)
          assert wheel.name.endswith("-py3-none-any.whl"), wheel.name
          PY

      - uses: actions/upload-artifact@v6
        with:
          name: kittentts-dist
          path: dist/*

  linux-wheel-audio-smoke:
    name: ${{ matrix.platform }} ${{ matrix.wheel-platform }} Python ${{ matrix.python-version }} audio
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux x86_64
            os: ubuntu-latest
            python-version: "3.8"
            python-tag: cp38
            wheel-platform: manylinux2014_x86_64
          - platform: Linux x86_64
            os: ubuntu-latest
            python-version: "3.9"
            python-tag: cp39
            wheel-platform: manylinux2014_x86_64
          - platform: Linux x86_64
